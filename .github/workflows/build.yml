name: Build Fritzing (Windows Only)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  QT_VERSION: '6.5.3'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qt5compat qtserialport'
        cache: true
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          C:\vcpkg\installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-
    
    - name: Install dependencies
      shell: powershell
      run: |
        # Install dependencies via vcpkg (only libgit2, boost is optional)
        Write-Host "Installing libgit2 via vcpkg..."
        vcpkg install libgit2:x64-windows-static
        if ($LASTEXITCODE -ne 0) {
          Write-Host "vcpkg install failed, continuing without libgit2..."
        }
    
    - name: Build zlib
      shell: powershell
      run: |
        # Download and build zlib manually
        $zlibVersion = "1.3.1"
        $zlibUrl = "https://github.com/madler/zlib/releases/download/v$zlibVersion/zlib-$zlibVersion.tar.gz"
        
        Invoke-WebRequest -Uri $zlibUrl -OutFile zlib.tar.gz
        tar -xzf zlib.tar.gz
        
        cd "zlib-$zlibVersion"
        New-Item -ItemType Directory -Force -Path build
        cd build
        
        cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
        cmake --build . --config Release --parallel $env:NUMBER_OF_PROCESSORS
        
        # Install to local directory
        New-Item -ItemType Directory -Force -Path ../../libs/zlib/lib
        New-Item -ItemType Directory -Force -Path ../../libs/zlib/include
        Copy-Item Release/zlibstatic.lib ../../libs/zlib/lib/zlib.lib -ErrorAction SilentlyContinue
        Copy-Item Release/zlib.lib ../../libs/zlib/lib/ -ErrorAction SilentlyContinue
        Copy-Item ../zlib.h ../../libs/zlib/include/
        Copy-Item zconf.h ../../libs/zlib/include/ -ErrorAction SilentlyContinue
        Copy-Item ../zconf.h.in ../../libs/zlib/include/zconf.h -ErrorAction SilentlyContinue
        
        cd ../..
    
    - name: Build quazip
      shell: powershell
      run: |
        $zlibRoot = "$PWD/libs/zlib"
        
        Write-Host "Using zlib at $zlibRoot"
        Write-Host "zlib.h exists: $(Test-Path $zlibRoot/include/zlib.h)"
        
        cd libs/quazip-1.4
        New-Item -ItemType Directory -Force -Path build
        cd build
        
        cmake .. `
          -DQUAZIP_QT_MAJOR_VERSION=6 `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_SHARED_LIBS=OFF `
          -DZLIB_LIBRARY="$zlibRoot/lib/zlib.lib" `
          -DZLIB_INCLUDE_DIR="$zlibRoot/include"
        
        cmake --build . --config Release --parallel $env:NUMBER_OF_PROCESSORS
        
        New-Item -ItemType Directory -Force -Path ../quazip-6.5.3-1.4/lib
        New-Item -ItemType Directory -Force -Path ../quazip-6.5.3-1.4/include/quazip
        Copy-Item quazip/Release/quazip1-qt6.lib ../quazip-6.5.3-1.4/lib/ -ErrorAction SilentlyContinue
        Copy-Item quazip/Release/quazip1-qt6.dll ../quazip-6.5.3-1.4/lib/ -ErrorAction SilentlyContinue
        Copy-Item ../quazip/*.h ../quazip-6.5.3-1.4/include/quazip/
    
    - name: Build ngspice
      shell: powershell
      run: |
        # Try to download ngspice pre-built binary for Windows
        $ngspiceUrl = "https://downloads.sourceforge.net/project/ngspice/ng-spice-rework/42/ngspice-42_dll_64.7z"
        try {
          Invoke-WebRequest -Uri $ngspiceUrl -OutFile ngspice.7z -TimeoutSec 120
          # Check if file is valid (7z magic number)
          $bytes = Get-Content ngspice.7z -Encoding Byte -TotalCount 6
          if ($bytes[0] -eq 0x37 -and $bytes[1] -eq 0x7A) {
            7z x ngspice.7z -ongspice-win -y
            New-Item -ItemType Directory -Force -Path libs/ngspice-42/lib
            New-Item -ItemType Directory -Force -Path libs/ngspice-42/include/ngspice
            Copy-Item ngspice-win/*.dll libs/ngspice-42/lib/ -ErrorAction SilentlyContinue
            Copy-Item ngspice-win/*.lib libs/ngspice-42/lib/ -ErrorAction SilentlyContinue
            Copy-Item ngspice-win/*.h libs/ngspice-42/include/ngspice/ -ErrorAction SilentlyContinue
            Write-Host "ngspice downloaded and extracted successfully"
          } else {
            Write-Host "Downloaded file is not a valid 7z archive, skipping ngspice"
          }
        } catch {
          Write-Host "Failed to download ngspice: $_"
          Write-Host "Circuit simulation will be disabled"
        }
    
    - name: Build libgit2 from source
      shell: powershell
      run: |
        # Build libgit2 from source
        # Fritzing expects libgit2 in parent directory: ../libgit2
        $parentDir = (Get-Item $PWD).Parent.FullName
        $libgit2Dir = "$parentDir/libgit2"
        Write-Host "Building libgit2 in: $libgit2Dir"
        
        cd libs/libgit2-1.7.1
        New-Item -ItemType Directory -Force -Path build64
        cd build64
        
        cmake .. `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_SHARED_LIBS=OFF `
          -DBUILD_TESTS=OFF `
          -DBUILD_CLI=OFF
        
        cmake --build . --config Release --parallel $env:NUMBER_OF_PROCESSORS
        
        # Copy to expected location (parent directory/libgit2)
        New-Item -ItemType Directory -Force -Path $libgit2Dir/include
        New-Item -ItemType Directory -Force -Path $libgit2Dir/build64/Release
        Copy-Item Release/git2.lib $libgit2Dir/build64/Release/ -ErrorAction SilentlyContinue
        Copy-Item ../include/git2 $libgit2Dir/include/ -Recurse -ErrorAction SilentlyContinue
        Copy-Item ../include/git2.h $libgit2Dir/include/ -ErrorAction SilentlyContinue
        
        # List what we created
        Write-Host "libgit2 files created:"
        Get-ChildItem $libgit2Dir -Recurse
        
        cd $PWD
    
    - name: Build Fritzing
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        qmake phoenix.pro CONFIG+=release
        nmake /f Makefile.Release 2>&1
    
    - name: Deploy Qt dependencies
      shell: powershell
      run: |
        $qtBin = "${env:Qt6_DIR}\bin"
        $releaseDir = "release64"
        
        # Use windeployqt to copy Qt dependencies
        & "$qtBin\windeployqt.exe" "$releaseDir\Fritzing.exe" --release --no-translations --no-system-d3d-compiler
        
        # Copy additional libraries
        Copy-Item libs/ngspice-42/lib/*.dll $releaseDir/ -ErrorAction SilentlyContinue
        Copy-Item libs/quazip-6.5.3-1.4/lib/*.dll $releaseDir/ -ErrorAction SilentlyContinue
    
    - name: Package Fritzing
      shell: powershell
      run: |
        $version = "1.0.0"
        $packageName = "Fritzing-${version}-Windows"
        
        # Create package directory
        New-Item -ItemType Directory -Force -Path $packageName
        
        # Copy executable and dependencies
        Copy-Item release64/* $packageName/ -Recurse -Force
        
        # Copy fritzing-parts (without .git)
        Copy-Item fritzing-parts $packageName/ -Recurse -Force
        # Remove .git if exists
        Remove-Item $packageName/fritzing-parts/.git -Recurse -Force -ErrorAction SilentlyContinue
        
        # Create README
        $readmeContent = 'Fritzing ' + $version + ' for Windows' + "`n`n" +
          'Installation:' + "`n" +
          '1. Extract this ZIP file to any location' + "`n" +
          '2. Run Fritzing.exe' + "`n`n" +
          'Features:' + "`n" +
          '- Full circuit design and simulation' + "`n" +
          '- PCB layout' + "`n" +
          '- Circuit simulation with ngspice' + "`n`n" +
          'For more information, visit https://fritzing.org'
        $readmeContent | Out-File -FilePath "$packageName/README.txt" -Encoding UTF8
        
        # Create ZIP
        Compress-Archive -Path $packageName -DestinationPath "${packageName}.zip" -Force
        
        Write-Host "Package created: ${packageName}.zip"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fritzing-Windows
        path: Fritzing-*.zip
        retention-days: 30
        if-no-files-found: warn
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: Fritzing-*.zip
        tag_name: v1.0.0-windows
        name: Fritzing Windows Build
        body: |
          Automated Windows build of Fritzing with full circuit simulation support.
          
          ## Installation
          1. Download the ZIP file
          2. Extract to any folder
          3. Run Fritzing.exe
          
          ## Features
          - Circuit design and schematic capture
          - PCB layout
          - Circuit simulation (ngspice)
          - Bill of materials generation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
