name: Build Fritzing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  QT_VERSION: '6.5.3'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qt5compat qtserialport'
        cache: true
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-
    
    - name: Install dependencies
      run: |
        brew install boost automake bison cmake libtool
        # 从源码构建 libgit2
        cd libs/libgit2-1.7.1
        mkdir -p build && cd build
        cmake .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
        cmake --build . -- -j$(sysctl -n hw.ncpu)
        mkdir -p ../lib
        cp libgit2.a ../lib/
        cd ../..
    
    - name: Build quazip
      run: |
        cd libs/quazip-1.4
        mkdir -p build && cd build
        cmake .. -DQUAZIP_QT_MAJOR_VERSION=6 -DCMAKE_BUILD_TYPE=Release
        cmake --build . -- -j$(sysctl -n hw.ncpu)
        mkdir -p ../quazip-6.5.3-1.4/lib
        cp quazip/libquazip1-qt6.* ../quazip-6.5.3-1.4/lib/ 2>/dev/null || true
        mkdir -p ../quazip-6.5.3-1.4/include/quazip
        cp ../quazip/*.h ../quazip-6.5.3-1.4/include/quazip/
    
    - name: Clone and build ngspice
      run: |
        # 克隆 ngspice 源码
        rm -rf libs/ngspice-42
        git clone --depth 1 https://git.code.sf.net/p/ngspice/ngspice libs/ngspice-42
        cd libs/ngspice-42
        # 使用 Homebrew 的 bison (3.8.x) - 优先使用 /usr/local 路径
        export PATH="/usr/local/opt/bison/bin:/opt/homebrew/opt/bison/bin:$PATH"
        which bison
        bison --version
        # 构建 ngspice
        ./autogen.sh
        mkdir -p release-sh && cd release-sh
        ../configure --with-ngshared --enable-cider --disable-openmp
        make -j$(sysctl -n hw.ncpu)
        # 安装到本地目录
        mkdir -p ../lib ../include/ngspice
        cp src/.libs/libngspice.0.dylib ../lib/
        cp ../include/ngspice/sharedspice.h ../include/ngspice/ 2>/dev/null || \
          find . -name "sharedspice.h" -exec cp {} ../include/ngspice/ \;
    
    - name: Build Fritzing
      run: |
        qmake phoenix.pro
        make -j$(sysctl -n hw.ncpu) 2>&1 | tee build.log
        # 检查 make 的退出码
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Build failed with errors!"
          exit 1
        fi
    
    - name: Debug build output
      if: always()
      run: |
        echo "=== Checking build output ==="
        ls -la release64/ 2>/dev/null || echo "release64/ not found"
        ls -la release64/Fritzing.app/ 2>/dev/null || echo "Fritzing.app not found"
        ls -la release64/Fritzing.app/Contents/ 2>/dev/null || echo "Contents not found"
        ls -la release64/Fritzing.app/Contents/MacOS/ 2>/dev/null || echo "MacOS not found"
        find release64 -name "Fritzing" -type f 2>/dev/null || echo "Fritzing binary not found"
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-macos
        path: build.log
    
    - name: Check if build succeeded
      run: |
        if [ -f "release64/Fritzing.app/Contents/MacOS/Fritzing" ]; then
          echo "Build succeeded!"
          exit 0
        else
          echo "Build failed!"
          exit 1
        fi
    
    - name: Create DMG
      run: |
        macdeployqt release64/Fritzing.app -dmg
        mv release64/Fritzing.dmg Fritzing-macOS.dmg
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fritzing-macOS
        path: Fritzing-macOS.dmg
        retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qt5compat qtserialport'
        cache: true
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          C:\vcpkg\installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-
    
    - name: Install dependencies
      run: |
        vcpkg install boost:x64-windows libgit2:x64-windows quazip:x64-windows || true
    
    - name: Build Fritzing
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        qmake phoenix.pro
        nmake /f Makefile.Release 2>&1 || mingw32-make -j4 2>&1
    
    - name: Create ZIP
      run: |
        cd release64
        7z a ../Fritzing-Windows.zip * || powershell -Command "Compress-Archive -Path '*' -DestinationPath '../Fritzing-Windows.zip'"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fritzing-Windows
        path: Fritzing-Windows.zip
        retention-days: 30
        if-no-files-found: ignore

  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        modules: 'qt5compat qtserialport'
        cache: true
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        # Ubuntu 22.04 已经有 Qt 6，不需要额外 PPA
        sudo apt-get install -y \
          build-essential \
          libgl1-mesa-dev \
          libgit2-dev \
          libngspice0-dev \
          cmake \
          wget \
          automake \
          bison \
          flex \
          libqt6svg6-dev \
          qt6-serialport-dev \
          libquazip1-qt6-dev || true
        # 如果 quazip 包不存在，从源码构建
        if ! dpkg -l | grep -q libquazip; then
          echo "Building quazip from source..."
          cd libs/quazip-1.4
          mkdir -p build && cd build
          cmake .. -DQUAZIP_QT_MAJOR_VERSION=6 -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(nproc)
          mkdir -p ../quazip-6.5.3-1.4/lib
          cp quazip/libquazip1-qt6.* ../quazip-6.5.3-1.4/lib/ 2>/dev/null || true
          mkdir -p ../quazip-6.5.3-1.4/include/quazip
          cp ../quazip/*.h ../quazip-6.5.3-1.4/include/quazip/
          cd ../..
        fi
    
    - name: Build Fritzing
      run: |
        qmake phoenix.pro
        make -j$(nproc) 2>&1 | tee build.log
    
    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log-linux
        path: build.log
    
    - name: Create AppImage
      run: |
        wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage || true
        chmod +x linuxdeployqt-continuous-x86_64.AppImage || true
        
        mkdir -p AppDir/usr/bin
        cp release64/Fritzing AppDir/usr/bin/ 2>/dev/null || true
        cp -r fritzing-parts AppDir/usr/share/fritzing/ 2>/dev/null || true
        
        ./linuxdeployqt-continuous-x86_64.AppImage \
          AppDir/usr/bin/Fritzing \
          -appimage 2>/dev/null || echo "AppImage creation skipped"
        
        if [ -f Fritzing*.AppImage ]; then
          mv Fritzing*.AppImage Fritzing-Linux.AppImage
        fi
    
    - name: Create tar.gz
      run: |
        tar -czf Fritzing-Linux.tar.gz release64/ fritzing-parts/ run-fritzing.sh 2>/dev/null || echo "tar.gz creation skipped"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Fritzing-Linux
        path: |
          Fritzing-Linux.AppImage
          Fritzing-Linux.tar.gz
        retention-days: 30
        if-no-files-found: ignore
