name: Build Fritzing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  QT_VERSION: '6.5.3'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qt5compat'
        cache: true
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
        key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          ${{ runner.os }}-brew-
    
    - name: Install dependencies
      run: |
        brew install boost libgit2 automake bison
        # quazip 和 ngspice 需要从源码构建
    
    - name: Build quazip
      run: |
        cd libs/quazip-1.4
        mkdir -p build && cd build
        cmake .. -DQUAZIP_QT_MAJOR_VERSION=6 -DCMAKE_BUILD_TYPE=Release
        cmake --build . -- -j$(sysctl -n hw.ncpu)
        mkdir -p ../quazip-6.5.3-1.4/lib
        cp quazip/libquazip1-qt6.* ../quazip-6.5.3-1.4/lib/
        mkdir -p ../quazip-6.5.3-1.4/include/quazip
        cp ../quazip/*.h ../quazip-6.5.3-1.4/include/quazip/
    
    - name: Build ngspice
      run: |
        cd libs/ngspice-42
        export PATH="/Users/huaniu/local/bin:$PATH"
        ./autogen.sh
        mkdir -p release-sh && cd release-sh
        ../configure --with-ngshared --enable-cider --disable-openmp
        make -j$(sysctl -n hw.ncpu)
        mkdir -p ../lib
        cp src/.libs/libngspice.0.dylib ../lib/
    
    - name: Build Fritzing
      run: |
        qmake phoenix.pro
        make -j$(sysctl -n hw.ncpu)
    
    - name: Create DMG
      run: |
        macdeployqt release64/Fritzing.app -dmg
        mv release64/Fritzing.dmg Fritzing-macOS.dmg
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fritzing-macOS
        path: Fritzing-macOS.dmg
        retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qt5compat'
        cache: true
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          C:\vcpkg\installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-
    
    - name: Install dependencies
      run: |
        vcpkg install boost:x64-windows libgit2:x64-windows quazip:x64-windows
    
    - name: Build Fritzing
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        qmake phoenix.pro
        nmake /f Makefile.Release
    
    - name: Create ZIP
      run: |
        cd release64
        7z a ../Fritzing-Windows.zip *
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Fritzing-Windows
        path: Fritzing-Windows.zip
        retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'linux'
        target: 'desktop'
        arch: 'gcc_64'
        modules: 'qt5compat'
        cache: true
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libgl1-mesa-dev \
          libgit2-dev \
          libquazip1-qt6-dev \
          libngspice0-dev \
          cmake \
          wget
    
    - name: Build Fritzing
      run: |
        qmake phoenix.pro
        make -j$(nproc)
    
    - name: Create AppImage
      run: |
        wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
        chmod +x linuxdeployqt-continuous-x86_64.AppImage
        
        mkdir -p AppDir/usr/bin
        cp release64/Fritzing AppDir/usr/bin/
        cp -r fritzing-parts AppDir/usr/share/fritzing/
        
        # 创建 desktop 文件
        cat > AppDir/usr/share/applications/fritzing.desktop << 'EOF'
        [Desktop Entry]
        Name=Fritzing
        Exec=Fritzing
        Icon=fritzing
        Type=Application
        Categories=Development;Electronics;
        EOF
        
        ./linuxdeployqt-continuous-x86_64.AppImage \
          AppDir/usr/bin/Fritzing \
          -appimage || echo "AppImage creation failed, continuing..."
        
        if [ -f Fritzing*.AppImage ]; then
          mv Fritzing*.AppImage Fritzing-Linux.AppImage
        fi
    
    - name: Create tar.gz
      run: |
        tar -czf Fritzing-Linux.tar.gz release64/ fritzing-parts/ run-fritzing.sh
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Fritzing-Linux
        path: |
          Fritzing-Linux.AppImage
          Fritzing-Linux.tar.gz
        retention-days: 30
        if-no-files-found: ignore
